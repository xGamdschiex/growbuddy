<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#16532a"/>
      <stop offset="100%" stop-color="#05130a"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <g transform="translate(256, 256)">
    <!-- Stem -->
    <rect x="-8" y="80" width="16" height="100" rx="8" fill="#22c55e"/>
    <!-- Left leaf -->
    <path d="M 0 100 Q -140 70 -130 -60 Q -60 -40 0 80 Z" fill="url(#leaf)"/>
    <!-- Right leaf -->
    <path d="M 0 100 Q 140 70 130 -60 Q 60 -40 0 80 Z" fill="url(#leaf)"/>
    <!-- Top leaf -->
    <path d="M 0 80 Q -70 -40 0 -170 Q 70 -40 0 80 Z" fill="#4ade80"/>
    <!-- Vein accent -->
    <line x1="0" y1="-160" x2="0" y2="75" stroke="#14532d" stroke-width="4" opacity="0.5"/>
  </g>
</svg>
