<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0f1a10"/>
      <stop offset="100%" stop-color="#081408"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Accent glow -->
  <circle cx="820" cy="250" r="260" fill="url(#glow)"/>

  <!-- Leaf Icon (stylized seedling) -->
  <g transform="translate(760, 130)">
    <!-- Stem -->
    <rect x="95" y="160" width="10" height="60" rx="5" fill="url(#accent)"/>
    <!-- Left leaf -->
    <path d="M 100 180 Q 20 150 30 60 Q 80 80 100 170 Z" fill="url(#accent)" opacity="0.95"/>
    <!-- Right leaf -->
    <path d="M 100 180 Q 180 150 170 60 Q 120 80 100 170 Z" fill="url(#accent)" opacity="0.95"/>
    <!-- Top leaf -->
    <path d="M 100 170 Q 60 80 100 10 Q 140 80 100 170 Z" fill="#4ade80"/>
    <!-- Leaf veins -->
    <line x1="100" y1="20" x2="100" y2="165" stroke="#166534" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="70" y="200" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-2">GrowBuddy</text>

  <!-- Tagline -->
  <text x="72" y="255" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500" fill="#22c55e" letter-spacing="1">Dein smarter Grow-Assistent</text>

  <!-- Feature badges -->
  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">
    <g transform="translate(70, 330)">
      <rect x="0" y="0" width="130" height="44" rx="22" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
      <text x="65" y="29" text-anchor="middle">VPD &amp; DLI</text>
    </g>
    <g transform="translate(215, 330)">
      <rect x="0" y="0" width="180" height="44" rx="22" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
      <text x="90" y="29" text-anchor="middle">AI Plant Doctor</text>
    </g>
    <g transform="translate(410, 330)">
      <rect x="0" y="0" width="190" height="44" rx="22" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
      <text x="95" y="29" text-anchor="middle">Düngerrechner</text>
    </g>
    <g transform="translate(615, 330)">
      <rect x="0" y="0" width="170" height="44" rx="22" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
      <text x="85" y="29" text-anchor="middle">Daily Check-in</text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <text x="70" y="440" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="400" fill="#9ca3af">Wissenschaftlich korrekt · Offline-fähig · DSGVO-konform</text>
</svg>
