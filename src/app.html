<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="color-scheme" content="dark" />
		<meta name="description" content="GrowBuddy — Dein smarter Grow-Assistent. Daily Check-ins mit Foto, VPD, DLI, 9 Düngerlinien, AI Plant Doctor. Wissenschaftlich korrekt, offline-fähig." />
		<meta name="keywords" content="Grow, Cannabis, VPD, DLI, Düngerrechner, Plant Doctor, Check-in, Gardening, Hydroponik" />
		<meta name="author" content="Lauritz Wirtz" />
		<meta name="robots" content="index, follow" />

		<!-- iOS PWA -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GrowBuddy" />
		<meta name="format-detection" content="telephone=no" />

		<!-- OpenGraph -->
		<meta property="og:title" content="GrowBuddy — Smart Grow Assistant" />
		<meta property="og:description" content="Track your grows, calculate nutrients, optimize VPD & DLI. AI Plant Doctor. Science-based, offline-first." />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="/icon-512.png" />
		<meta property="og:site_name" content="GrowBuddy" />
		<meta property="og:locale" content="de_DE" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="GrowBuddy — Smart Grow Assistant" />
		<meta name="twitter:description" content="Daily Check-ins, VPD/DLI, AI Plant Doctor — wissenschaftlich korrekt, offline-fähig." />
		<meta name="twitter:image" content="/icon-512.png" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
		<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
		<link rel="mask-icon" href="/favicon.svg" color="#22c55e" />

		<!-- Canonical -->
		<link rel="canonical" href="https://growbuddy.app/" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-gb-bg text-gb-text">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Service Worker nur in Production registrieren (nicht im Dev)
			if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('/sw.js').catch(() => {});
				});
			}
		</script>
	</body>
</html>
