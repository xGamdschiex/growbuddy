<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="description" content="GrowBuddy — Dein smarter Grow-Assistent. VPD, DLI, Düngerrechner & Grow-Tracker." />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="GrowBuddy" />
		<meta property="og:title" content="GrowBuddy — Smart Grow Assistant" />
		<meta property="og:description" content="Track your grows, calculate nutrients, optimize VPD & DLI. Science-based, offline-first." />
		<meta property="og:type" content="website" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.register('/sw.js');
			}
		</script>
	</body>
</html>
